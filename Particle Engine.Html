<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Engine</title>
    <style>
        body {
            margin: 0; overflow: hidden; background-color: #010103;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white; user-select: none;
        }
        canvas { display: block; }

        #ui-layer {
            position: absolute; top: 24px; left: 24px;
            background: rgba(10, 10, 15, 0.4); backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 24px; border-radius: 12px; border: 1px solid rgba(0, 255, 204, 0.15);
            box-shadow: 0 8px 32px rgba(0, 255, 204, 0.05); width: 290px;
            pointer-events: none; transition: all 0.5s ease;
        }
        h2 { margin: 0 0 16px 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; color: #00ffcc;}
        .stat-row { display: flex; justify-content: space-between; margin: 10px 0; font-size: 0.85rem; color: #aaa;}
        .highlight { color: #fff; font-weight: 600; text-transform: uppercase; }
        
        .gesture-guide { 
            margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.08); 
            padding-top: 15px; font-size: 0.75rem; color: #888; line-height: 1.8;
        }

        #video-container {
            position: absolute; top: 24px; right: 24px; width: 180px; height: 135px;
            border-radius: 8px; overflow: hidden; border: 2px solid rgba(0, 255, 204, 0.2);
            transform: scaleX(-1);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #status-badge {
            position: absolute; top: 12px; right: 12px; padding: 6px 12px;
            background: rgba(255, 51, 102, 0.9); color: #fff; font-weight: bold; border-radius: 4px;
            font-size: 0.75rem; transform: scaleX(-1); display: none; letter-spacing: 1px;
        }

        .rainbow-text { animation: rainbow 2s linear infinite; }
        @keyframes rainbow {
            0% { color: #ff3366; } 33% { color: #00ffcc; } 66% { color: #cc33ff; } 100% { color: #ff3366; }
        }

        .swarm-text { color: #ffaa00 !important; font-style: italic; letter-spacing: 3px; animation: glitch 2s infinite; }
        @keyframes glitch { 0% {opacity: 1;} 90% {opacity: 1;} 95% {opacity: 0.3;} 100% {opacity: 1;} }

        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 1.1rem; letter-spacing: 3px; color: #00ffcc; animation: pulse 1s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="loading">BOOTING ORGANIC KERNEL...</div>
    
    <div id="ui-layer">
        <h2>System Telemetry</h2>
        <div class="stat-row">Topology: <span id="shape-name" class="highlight">MIRROR</span></div>
        <div class="stat-row">Scale Matrix: <span id="zoom-val" class="highlight">1.0x</span></div>
        <div class="stat-row">Physics Core: <span id="physics-state" class="highlight" style="color:#00ffcc">IDLE</span></div>
        
        <div class="gesture-guide">
            🖐️ <b>1-5 Fingers:</b> Set Topology<br>
            🤏 <b>Pinch:</b> Scale Up/Down<br>
            ✊ <b>Fist + 🖐️ Palm:</b> Grab & Rotate<br>
            👐 <b>Two Palms:</b> Cycle Colors<br>
            💥 <b>Tight Fist -> Open:</b> Blast<br>
        </div>
    </div>

    <div id="video-container">
        <video id="input_video" autoplay playsinline></video>
        <div id="status-badge">COMPRESSING</div>
    </div>

    <canvas id="text-canvas" width="120" height="40" style="display:none;"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        // --- 1. CORE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 28;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const gridW = 80, gridH = 60;
        const particleCount = gridW * gridH;
        
        const videoCanvas = document.createElement('canvas');
        videoCanvas.width = gridW; videoCanvas.height = gridH;
        const videoCtx = videoCanvas.getContext('2d', { willReadFrequently: true });
        const videoElement = document.getElementById('input_video');

        const textCanvas = document.getElementById('text-canvas');
        const textCtx = textCanvas.getContext('2d', { willReadFrequently: true });

        // --- 2. PARTICLE ARRAYS ---
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3);
        
        for(let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 40;
            positions[i*3+1] = (Math.random() - 0.5) * 40;
            positions[i*3+2] = (Math.random() - 0.5) * 40;
            colors[i*3] = 1; colors[i*3+1] = 1; colors[i*3+2] = 1;
            velocities[i*3] = 0; velocities[i*3+1] = 0; velocities[i*3+2] = 0;
        }
        
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const material = new THREE.PointsMaterial({
            size: 0.35, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- 3. GEOMETRY GENERATORS ---
        const shapes = { mirror: [], heart: [], saturn: [], flower: [], fireworks: [], alien: [], spaceship: [] };
        const targetColors = new Float32Array(particleCount * 3);

        function generateStaticShapes() {
            for (let i = 0; i < particleCount; i++) {
                shapes.mirror.push(new THREE.Vector3(0,0,0));

                const tH = Math.random() * Math.PI * 2;
                shapes.heart.push(new THREE.Vector3(
                    (16 * Math.pow(Math.sin(tH), 3)) * 0.45, 
                    (13 * Math.cos(tH) - 5 * Math.cos(2*tH) - 2 * Math.cos(3*tH) - Math.cos(4*tH)) * 0.45, 
                    (Math.random() - 0.5) * 3
                ));

                if (i < particleCount * 0.4) {
                    const u = Math.random(), v = Math.random();
                    const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
                    shapes.saturn.push(new THREE.Vector3(5 * Math.sin(phi) * Math.cos(theta), 5 * Math.sin(phi) * Math.sin(theta), 5 * Math.cos(phi)));
                } else {
                    const theta = Math.random() * Math.PI * 2;
                    const r = 7 + Math.random() * 5;
                    shapes.saturn.push(new THREE.Vector3(r * Math.cos(theta), (Math.random()-0.5)*0.5, r * Math.sin(theta)));
                }

                const tF = Math.random() * Math.PI * 2;
                const rF = 11 * Math.cos(5 * tF) * Math.random();
                shapes.flower.push(new THREE.Vector3(rF * Math.cos(tF), rF * Math.sin(tF), (Math.random()-0.5)*2));

                const uF = Math.random(), vF = Math.random();
                const thetaF = 2 * Math.PI * uF, phiF = Math.acos(2 * vF - 1);
                const rFire = 18 * Math.pow(Math.random(), 0.6);
                shapes.fireworks.push(new THREE.Vector3(rFire * Math.sin(phiF) * Math.cos(thetaF), rFire * Math.sin(phiF) * Math.sin(thetaF), rFire * Math.cos(phiF)));

                let t = (i / particleCount) * Math.PI * 2;
                let pK = 3, qK = 4;
                let rK = 6 + 2 * Math.cos(qK * t);
                shapes.alien.push(new THREE.Vector3(
                    rK * Math.cos(pK * t) + (Math.random()-0.5),
                    rK * Math.sin(pK * t) + (Math.random()-0.5),
                    2 * Math.sin(qK * t) + (Math.random()-0.5)
                ));

                // STAR WARS X-WING
                let prob = Math.random();
                let sx, sy, sz;
                if (prob < 0.25) {
                    let zPos = (Math.random() - 0.5) * 20;
                    let radius = (zPos > 5) ? (10 - zPos)*0.15 : 1.2; 
                    let angle = Math.random() * Math.PI * 2;
                    sx = radius * Math.cos(angle); sy = radius * Math.sin(angle); sz = zPos;
                } else {
                    let wing = Math.floor(Math.random() * 4);
                    let wLength = Math.random() * 12; 
                    let wZ = (Math.random() - 0.5) * 8 - 4; 
                    let wAngle = wLength * 0.4; 
                    if (wing === 0) { sx = wLength; sy = wAngle; sz = wZ; } 
                    else if (wing === 1) { sx = -wLength; sy = wAngle; sz = wZ; } 
                    else if (wing === 2) { sx = wLength; sy = -wAngle; sz = wZ; } 
                    else { sx = -wLength; sy = -wAngle; sz = wZ; } 
                }
                shapes.spaceship.push(new THREE.Vector3(sx, sy, sz));
            }
        }
        generateStaticShapes();

        let idleTextPositions = [];
        function generateAlienText(word) {
            textCtx.clearRect(0, 0, 120, 40);
            textCtx.fillStyle = 'white';
            textCtx.font = 'bold 20px monospace';
            textCtx.textAlign = 'center';
            textCtx.textBaseline = 'middle';
            textCtx.fillText(word, 60, 20);
            
            const imgData = textCtx.getImageData(0, 0, 120, 40).data;
            let pts = [];
            for(let y=0; y<40; y++) {
                for(let x=0; x<120; x++) {
                    if(imgData[(y*120+x)*4+3] > 128) {
                        pts.push(new THREE.Vector3((x-60)*0.3, -(y-20)*0.3, (Math.random()-0.5)*1.5));
                    }
                }
            }
            if(pts.length === 0) pts.push(new THREE.Vector3(0,0,0)); 
            
            idleTextPositions = [];
            for(let i=0; i<particleCount; i++) {
                let ref = pts[i % pts.length];
                idleTextPositions.push(new THREE.Vector3(ref.x + (Math.random()-0.5)*0.2, ref.y + (Math.random()-0.5)*0.2, ref.z));
            }
        }

        // --- 4. STATE VARIABLES ---
        let currentShape = 'mirror';
        let rawScale = 1.0, currentScale = 1.0;
        let rawOffset = new THREE.Vector3(0, 0, 0);
        let currentOffset = new THREE.Vector3(0, 0, 0);
        
        let customHue = 0.5;
        let tempColor = new THREE.Color();
        
        let isCompressing = false;
        let isColorCycling = false;
        let isHoldingAndRotating = false;
        let targetRotX = 0, targetRotY = 0;
        let currentRotX = 0, currentRotY = 0;

        let isIdle = true;
        let idleMode = 'SWARM'; 
        let lastIdleSwitch = Date.now();
        let currentIdleDuration = 5000; 
        const alienWords = ["A N O M A L Y", "S I G N A L", "O R I G I N", "U N K N O W N"];

        let orbA = new THREE.Vector3();
        let orbB = new THREE.Vector3();
        let gestureMemory = Array(15).fill(4); 

        // --- 5. AI GESTURE LOGIC ---
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        function getFingerCount(lm) {
            let count = 0;
            let pCenterX = (lm[0].x + lm[9].x) / 2;
            if (Math.abs(lm[4].x - pCenterX) > 0.08) count++; 
            if (lm[8].y < lm[6].y) count++; 
            if (lm[12].y < lm[10].y) count++; 
            if (lm[16].y < lm[14].y) count++; 
            if (lm[20].y < lm[18].y) count++; 
            return count;
        }

        hands.onResults((results) => {
            document.getElementById('loading').style.display = 'none';

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                isIdle = false; 
                document.getElementById('physics-state').classList.remove("swarm-text");

                const hand1 = results.multiHandLandmarks[0];
                const count1 = getFingerCount(hand1);

                if (results.multiHandLandmarks.length === 2) {
                    const hand2 = results.multiHandLandmarks[1];
                    const count2 = getFingerCount(hand2);

                    let pinch1 = Math.hypot(hand1[4].x - hand1[8].x, hand1[4].y - hand1[8].y) < 0.05;
                    let pinch2 = Math.hypot(hand2[4].x - hand2[8].x, hand2[4].y - hand2[8].y) < 0.05;

                    if (count1 >= 4 && count2 >= 4) {
                        isColorCycling = true; isHoldingAndRotating = false;
                        document.getElementById('physics-state').innerText = "TUNING COLOR";
                        document.getElementById('physics-state').classList.add("rainbow-text");
                    } 
                    else if ((pinch1 && count2 >= 4) || (pinch2 && count1 >= 4)) {
                        isColorCycling = false; isHoldingAndRotating = true;
                        document.getElementById('physics-state').classList.remove("rainbow-text");
                        document.getElementById('physics-state').innerText = "MANUAL OVERRIDE";
                        
                        let palmHand = (count1 >= 4) ? hand1 : hand2;
                        targetRotY = (palmHand[9].x - 0.5) * Math.PI * 4; 
                        targetRotX = (palmHand[9].y - 0.5) * Math.PI * 4; 
                    } else {
                        isColorCycling = false; isHoldingAndRotating = false;
                    }
                } 
                else {
                    isColorCycling = false; isHoldingAndRotating = false;
                    document.getElementById('physics-state').classList.remove("rainbow-text");

                    let nx = (1.0 - hand1[9].x) * 2 - 1; 
                    let ny = -(hand1[9].y) * 2 + 1;
                    rawOffset.set(nx * 15, ny * 10, 0); 

                    let pinchDist = Math.hypot(hand1[4].x - hand1[8].x, hand1[4].y - hand1[8].y);
                    rawScale = 0.4 + (pinchDist * 8);
                    rawScale = Math.min(Math.max(0.4, rawScale), 3.0);

                    gestureMemory.shift(); gestureMemory.push(count1);
                    let counts = {};
                    let stableCount = gestureMemory[0];
                    let maxOccurs = 0;
                    for (let num of gestureMemory) {
                        counts[num] = (counts[num] || 0) + 1;
                        if (counts[num] > maxOccurs) { maxOccurs = counts[num]; stableCount = num; }
                    }

                    if (stableCount === 0) {
                        if (!isCompressing) {
                            isCompressing = true;
                            document.getElementById('status-badge').style.display = 'block';
                            document.getElementById('physics-state').innerText = "CRITICAL MASS";
                            document.getElementById('physics-state').style.color = "#ff3366";
                        }
                    } else {
                        if (isCompressing) {
                            isCompressing = false;
                            document.getElementById('status-badge').style.display = 'none';
                            
                            if (stableCount >= 4) {
                                document.getElementById('physics-state').innerText = "KINETIC BLAST";
                                for(let i=0; i<particleCount; i++) {
                                    velocities[i*3] = (Math.random() - 0.5) * 12;
                                    velocities[i*3+1] = (Math.random() - 0.5) * 12;
                                    velocities[i*3+2] = (Math.random() - 0.5) * 12;
                                }
                            }
                            setTimeout(() => {
                                if(!isIdle && !isHoldingAndRotating) {
                                    document.getElementById('physics-state').innerText = "STABLE";
                                    document.getElementById('physics-state').style.color = "#00ffcc";
                                }
                            }, 800);
                        }

                        if (!isCompressing) {
                            if (stableCount === 1) currentShape = 'heart';
                            else if (stableCount === 2) currentShape = 'saturn';
                            else if (stableCount === 3) currentShape = 'flower';
                            else if (stableCount === 4) currentShape = 'mirror';
                            else if (stableCount === 5) currentShape = 'fireworks';
                            
                            document.getElementById('shape-name').innerText = currentShape.toUpperCase();
                        }
                    }
                }
            } else {
                if(!isIdle) {
                    isIdle = true; 
                    lastIdleSwitch = Date.now();
                    idleMode = 'SWARM';
                    currentIdleDuration = 8000; 
                }
                isCompressing = false; isColorCycling = false; isHoldingAndRotating = false;
                document.getElementById('status-badge').style.display = 'none';
                document.getElementById('physics-state').classList.remove("rainbow-text");
                document.getElementById('physics-state').classList.add("swarm-text");
                document.getElementById('shape-name').innerText = "AWAITING INPUT";
                
                rawOffset.set(0,0,0); 
                // Synchronized Breathing Scale
                rawScale = 1.0 + Math.sin(Date.now() * 0.0015) * 0.08; 
            }
        });

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 320, height: 240
        });
        cameraFeed.start();

        const clock = new THREE.Clock();

        // --- 6. RENDER LOOP & PHYSICS ---
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // IDLE STATE MACHINE CONTROLLER 
            if (isIdle) {
                let now = Date.now();
                if (idleMode === 'SUPERNOVA_C' && now - lastIdleSwitch > 2000) {
                    idleMode = 'SUPERNOVA_B'; 
                    for(let i=0; i<particleCount; i++) {
                        velocities[i*3] = (Math.random() - 0.5) * 18;
                        velocities[i*3+1] = (Math.random() - 0.5) * 18;
                        velocities[i*3+2] = (Math.random() - 0.5) * 18;
                    }
                    lastIdleSwitch = now;
                } 
                else if (now - lastIdleSwitch > currentIdleDuration) {
                    const modes = ['SWARM', 'TEXT', 'ALIEN', 'SPACESHIP', 'CLASH', 'SUPERNOVA_C'];
                    let nextMode;
                    do { nextMode = modes[Math.floor(Math.random() * modes.length)]; } while (nextMode === idleMode);
                    
                    idleMode = nextMode;
                    document.getElementById('physics-state').innerText = "ANOMALY: " + idleMode;
                    
                    if(idleMode === 'TEXT') generateAlienText(alienWords[Math.floor(Math.random() * alienWords.length)]);
                    
                    currentIdleDuration = (idleMode === 'SWARM' || idleMode === 'CLASH') ? 7000 + Math.random()*5000 : 3000 + Math.random()*4000;
                    lastIdleSwitch = now;
                }

                // Entity Clash Math
                if (idleMode === 'CLASH') {
                    orbA.set(Math.sin(time * 1.5) * 12, Math.cos(time * 2.1) * 8, Math.sin(time * 0.8) * 5);
                    orbB.set(Math.cos(time * 1.8) * 12, Math.sin(time * 2.4) * 8, Math.cos(time * 0.9) * 5);
                    if (time % 3 < 0.3) {
                        orbA.lerp(new THREE.Vector3(0,0,0), 0.2);
                        orbB.lerp(new THREE.Vector3(0,0,0), 0.2);
                    }
                }
            }

            // Damping & Transforms
            currentScale += (rawScale - currentScale) * 0.05; 
            particleSystem.scale.set(currentScale, currentScale, currentScale);
            document.getElementById('zoom-val').innerText = currentScale.toFixed(1) + 'x';
            currentOffset.lerp(rawOffset, 0.05);

            if (isColorCycling) customHue = (customHue + 0.004) % 1.0;

            // Webcam Pixels
            if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
                videoCtx.save(); videoCtx.scale(-1, 1);
                videoCtx.drawImage(videoElement, -gridW, 0, gridW, gridH);
                videoCtx.restore();
                
                const imgData = videoCtx.getImageData(0, 0, gridW, gridH).data;
                tempColor.setHSL(customHue, 0.9, 0.6); 
                
                for(let y=0; y<gridH; y++) {
                    for(let x=0; x<gridW; x++) {
                        const i = (y * gridW + x);
                        const i4 = i * 4;
                        const r = imgData[i4]/255, g = imgData[i4+1]/255, b = imgData[i4+2]/255;

                        if (isIdle) {
                            if (idleMode === 'CLASH') {
                                if (i < particleCount / 2) { targetColors[i*3] = 1.0; targetColors[i*3+1] = 0.1; targetColors[i*3+2] = 0.2; }
                                else { targetColors[i*3] = 0.0; targetColors[i*3+1] = 0.8; targetColors[i*3+2] = 1.0; }
                            } else if (idleMode === 'SWARM') {
                                // Shared synchronized breathing color
                                let breathe = Math.sin(time * 0.5) * 0.1;
                                tempColor.setHSL(0.55 + breathe, 0.9, 0.6); 
                                targetColors[i*3] = tempColor.r; targetColors[i*3+1] = tempColor.g; targetColors[i*3+2] = tempColor.b;
                            } else {
                                targetColors[i*3] = 0.0; targetColors[i*3+1] = 1.0; targetColors[i*3+2] = 0.8; 
                            }
                        } else if (currentShape === 'mirror' && !isCompressing) {
                            shapes.mirror[i].set((x - gridW/2) * 0.45, -(y - gridH/2) * 0.45, ((r+g+b)/3) * 7);
                            targetColors[i*3] = r; targetColors[i*3+1] = g; targetColors[i*3+2] = b;
                        } else {
                            targetColors[i*3] = tempColor.r; targetColors[i*3+1] = tempColor.g; targetColors[i*3+2] = tempColor.b;
                        }
                    }
                }
            }

            // Engine Core Math & Fluid Momentum
            const currentPos = particleSystem.geometry.attributes.position.array;
            const currentCol = particleSystem.geometry.attributes.color.array;
            
            let targetPos = shapes[currentShape];
            if (isIdle) {
                if (idleMode === 'ALIEN') targetPos = shapes.alien;
                if (idleMode === 'TEXT') targetPos = idleTextPositions;
                if (idleMode === 'SPACESHIP') targetPos = shapes.spaceship;
            }

            // Global Wind Vector (Synchronizes all particles in Swarm mode)
            let globalWindX = Math.sin(time * 0.3) * 0.08;
            let globalWindY = Math.cos(time * 0.25) * 0.08;
            let globalWindZ = Math.sin(time * 0.4) * 0.08;

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                
                // Color Morphing
                currentCol[i3] += (targetColors[i3] - currentCol[i3]) * 0.05;
                currentCol[i3+1] += (targetColors[i3+1] - currentCol[i3+1]) * 0.05;
                currentCol[i3+2] += (targetColors[i3+2] - currentCol[i3+2]) * 0.05;

                let isCompressState = isCompressing || (isIdle && idleMode === 'SUPERNOVA_C');

                if (isIdle && idleMode === 'SWARM') {
                    // FLUID MOMENTUM: Add local noise + global wind to velocities
                    let localNoiseX = Math.sin(currentPos[i3+1] * 0.15 + time) * 0.03;
                    let localNoiseY = Math.cos(currentPos[i3] * 0.15 + time * 0.8) * 0.03;
                    let localNoiseZ = Math.sin(currentPos[i3+2] * 0.15 + time * 1.2) * 0.03;
                    
                    // Wandering attractor to keep them grouped
                    let centerX = Math.sin(time*0.5) * 4;
                    let centerY = Math.cos(time*0.3) * 4;
                    
                    velocities[i3] += globalWindX + localNoiseX + (centerX - currentPos[i3]) * 0.002;
                    velocities[i3+1] += globalWindY + localNoiseY + (centerY - currentPos[i3+1]) * 0.002;
                    velocities[i3+2] += globalWindZ + localNoiseZ + (-currentPos[i3+2]) * 0.002;

                } else if (isIdle && idleMode === 'CLASH') {
                    let activeOrb = (i < particleCount / 2) ? orbA : orbB;
                    let noiseX = Math.sin(time * 2 + i) * 1.5;
                    let noiseY = Math.cos(time * 3 + i) * 1.5;
                    let noiseZ = Math.sin(time * 4 + i) * 1.5;

                    velocities[i3] += ((activeOrb.x + noiseX) - currentPos[i3]) * 0.02;
                    velocities[i3+1] += ((activeOrb.y + noiseY) - currentPos[i3+1]) * 0.02;
                    velocities[i3+2] += ((activeOrb.z + noiseZ) - currentPos[i3+2]) * 0.02;

                } else if (isCompressState) {
                    velocities[i3] += (currentOffset.x - currentPos[i3]) * 0.05;
                    velocities[i3+1] += (currentOffset.y - currentPos[i3+1]) * 0.05;
                    velocities[i3+2] += (currentOffset.z - currentPos[i3+2]) * 0.05;
                } else {
                    // ORGANIC LERP: Instead of snapping, add to velocity to drift into shapes
                    velocities[i3] += ((targetPos[i].x + currentOffset.x) - currentPos[i3]) * 0.015;
                    velocities[i3+1] += ((targetPos[i].y + currentOffset.y) - currentPos[i3+1]) * 0.015;
                    velocities[i3+2] += ((targetPos[i].z + currentOffset.z) - currentPos[i3+2]) * 0.015;
                }

                // Apply universal friction/drag
                let drag = (isIdle && idleMode === 'SWARM') ? 0.94 : 0.88;
                velocities[i3] *= drag; 
                velocities[i3+1] *= drag; 
                velocities[i3+2] *= drag;

                // Move particles based on velocity
                currentPos[i3] += velocities[i3];
                currentPos[i3+1] += velocities[i3+1];
                currentPos[i3+2] += velocities[i3+2];
            }

            particleSystem.geometry.attributes.position.needsUpdate = true;
            particleSystem.geometry.attributes.color.needsUpdate = true;

            // ROTATION CONTROLLER
            if (isHoldingAndRotating) {
                currentRotX += (targetRotX - currentRotX) * 0.1;
                currentRotY += (targetRotY - currentRotY) * 0.1;
                particleSystem.rotation.x = currentRotX;
                particleSystem.rotation.y = currentRotY;
            } else if (isIdle) {
                if(idleMode === 'SPACESHIP') {
                    particleSystem.rotation.y += 0.008; 
                    particleSystem.rotation.x = 0.2; 
                } else {
                    particleSystem.rotation.y += 0.003; particleSystem.rotation.x += 0.002;
                }
                currentRotX = particleSystem.rotation.x; currentRotY = particleSystem.rotation.y;
            } else if (currentShape !== 'mirror' && !isCompressing) {
                particleSystem.rotation.y += 0.002; particleSystem.rotation.x += 0.001;
                currentRotX = particleSystem.rotation.x; currentRotY = particleSystem.rotation.y;
            } else {
                particleSystem.rotation.y *= 0.90; particleSystem.rotation.x *= 0.90;
                currentRotX = particleSystem.rotation.x; currentRotY = particleSystem.rotation.y;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
